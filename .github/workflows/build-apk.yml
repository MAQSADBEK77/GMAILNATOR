name: Build APKs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" "build-tools;34.0.0" "platform-tools" || true

      - name: Setup Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Build Gmailnator APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace 2>&1

      - name: Build Gmailnator Auto APK
        working-directory: android-auto
        run: gradle assembleDebug --no-daemon --stacktrace 2>&1

      - name: Upload Gmailnator APK
        uses: actions/upload-artifact@v4
        with:
          name: Gmailnator-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Gmailnator Auto APK
        uses: actions/upload-artifact@v4
        with:
          name: Gmailnator-Auto-APK
          path: android-auto/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
