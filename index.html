<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#0d0d14"/>
  <link rel="manifest" href="manifest.json"/>
  <title>Tempmail</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --bg:#0d0d14;
      --card:#15182a;
      --border:#222442;
      --blue:#5c7cfa;
      --green:#2f9e44;
      --gl:#51cf66;
      --red:#fa5252;
      --text:#e9ecef;
      --muted:#5c6380;
      --r:14px;
    }

    html,body{
      height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
      -webkit-tap-highlight-color:transparent;
      overscroll-behavior:none;
      touch-action:manipulation;
    }

    body{
      display:flex;
      flex-direction:column;
      padding:env(safe-area-inset-top,12px) 12px env(safe-area-inset-bottom,12px);
      gap:10px;
      min-height:100%;
    }

    /* ── Info row ─────────────────────────── */
    .info-row{
      display:flex;
      gap:10px;
    }

    .info-box{
      flex:1;
      background:var(--card);
      border:1.5px solid var(--border);
      border-radius:var(--r);
      padding:10px 14px;
      cursor:pointer;
      transition:border-color .15s;
      -webkit-user-select:none;
      user-select:none;
      position:relative;
      overflow:hidden;
      min-height:62px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .info-box.email-box{flex:1.4}
    .info-box.active{border-color:var(--blue)}
    .info-box.code-box.active{border-color:var(--gl)}
    .info-box:active{opacity:.8}

    .info-label{
      font-size:.6rem;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.8px;
      color:var(--muted);
      margin-bottom:4px;
    }

    .info-val{
      font-size:.82rem;
      font-weight:700;
      color:var(--blue);
      word-break:break-all;
      line-height:1.2;
    }

    .code-box .info-val{
      font-size:1.8rem;
      letter-spacing:6px;
      color:var(--gl);
      text-align:center;
    }

    .info-muted{
      font-size:.72rem;
      color:var(--muted);
    }

    /* copy flash */
    .info-box::after{
      content:'✓ Nusxalandi';
      position:absolute;
      inset:0;
      background:rgba(47,158,68,.9);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:.9rem;
      font-weight:800;
      color:#fff;
      opacity:0;
      transition:opacity .15s;
      border-radius:calc(var(--r) - 1px);
    }

    .info-box.flash::after{opacity:1}

    /* ── Status ───────────────────────────── */
    .status{
      padding:8px 14px;
      border-radius:10px;
      font-size:.78rem;
      font-weight:500;
      text-align:center;
      background:var(--card);
      border:1px solid var(--border);
      color:var(--muted);
      transition:all .2s;
      min-height:36px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
    }

    .status.ok {border-color:var(--green);color:var(--gl);background:#0a1f0d}
    .status.err{border-color:var(--red);color:#ff8787;background:#1f0a0a}
    .status.info{border-color:var(--blue);color:#91a7ff;background:#0a0e2a}

    /* ── Buttons ──────────────────────────── */
    .btns{
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:1;
    }

    .btn{
      flex:1;
      border:none;
      border-radius:var(--r);
      font-weight:800;
      font-size:1rem;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      transition:transform .1s,filter .1s;
      min-height:64px;
      letter-spacing:.2px;
    }

    .btn:active{transform:scale(.96)}
    .btn:disabled{opacity:.4;transform:none}

    .btn-email{background:linear-gradient(135deg,#3b5bdb,#7048e8);color:#fff}
    .btn-code {background:linear-gradient(135deg,#2f9e44,#37b24d);color:#fff}
    .btn-new  {background:var(--card);color:var(--muted);border:1.5px solid var(--border)}
    .btn-new:active{background:#1c1f35}

    .ico{font-size:1.4rem}

    .spin{
      display:inline-block;
      width:20px;height:20px;
      border:3px solid rgba(255,255,255,.25);
      border-top-color:#fff;
      border-radius:50%;
      animation:rot .6s linear infinite;
    }

    @keyframes rot{to{transform:rotate(360deg)}}

    /* ── Auto row ─────────────────────────── */
    .auto-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 2px;
    }

    .auto-label{
      font-size:.75rem;
      color:var(--muted);
      display:flex;
      align-items:center;
      gap:6px;
    }

    .cd{font-size:.72rem;color:var(--blue);min-width:20px}

    .toggle{position:relative;width:40px;height:22px}
    .toggle input{display:none}
    .track{
      position:absolute;inset:0;
      background:var(--border);
      border-radius:22px;
      cursor:pointer;
      transition:.2s;
    }
    .track::before{
      content:'';
      position:absolute;
      width:15px;height:15px;
      background:var(--muted);
      border-radius:50%;
      top:3.5px;left:3.5px;
      transition:.2s;
    }
    .toggle input:checked+.track{background:#1d3a6e}
    .toggle input:checked+.track::before{background:var(--blue);transform:translateX(18px)}

    /* ── Screen flash ─────────────────────── */
    #flash{
      position:fixed;inset:0;
      background:rgba(47,158,68,.3);
      pointer-events:none;
      opacity:0;
      transition:opacity .1s;
      z-index:999;
    }

    #flash.on{opacity:1}
  </style>
</head>
<body>

<div id="flash"></div>

<!-- Email + Code displays -->
<div class="info-row">
  <div class="info-box email-box" id="emailBox" onclick="tap('email')">
    <div class="info-label">Email</div>
    <div class="info-muted" id="eEmpty">Hali yo'q</div>
    <div class="info-val" id="eVal" style="display:none"></div>
  </div>
  <div class="info-box code-box" id="codeBox" onclick="tap('code')">
    <div class="info-label">Kod</div>
    <div class="info-muted" id="cEmpty" style="text-align:center">—</div>
    <div class="info-val" id="cVal" style="display:none"></div>
  </div>
</div>

<!-- Status -->
<div class="status" id="st">Tayyor</div>

<!-- Buttons -->
<div class="btns">
  <button class="btn btn-email" id="bEmail" onclick="genEmail()">
    <span class="ico">📧</span> EMAIL OL
  </button>
  <button class="btn btn-code" id="bCode" onclick="getCode()" disabled>
    <span class="ico">🔍</span> KOD OL
  </button>
  <button class="btn btn-new" id="bNew" onclick="newEmail()" disabled>
    <span class="ico">🔄</span> YANGI EMAIL
  </button>
</div>

<!-- Auto refresh -->
<div class="auto-row">
  <div class="auto-label">
    <label class="toggle">
      <input type="checkbox" id="autoChk" onchange="toggleAuto()"/>
      <span class="track"></span>
    </label>
    Avtomatik tekshiruv
    <span class="cd" id="cdTxt"></span>
  </div>
</div>

<script>
const API = 'https://api.mail.tm';
let token='', email='', lastCode='', seenIds=new Set();
let cdTimer=null, cdSec=0, busy=false;
const AUTO=15;

// ── Service Worker ──────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ── Status helper ───────────────────────────────────────
function st(msg,type=''){
  const el=document.getElementById('st');
  el.textContent=msg; el.className='status '+type;
}

// ── API ─────────────────────────────────────────────────
async function api(path,opts={}){
  const h={'Content-Type':'application/json'};
  if(token) h['Authorization']='Bearer '+token;
  const r=await fetch(API+path,{...opts,headers:h});
  if(r.status===204) return {};
  const d=await r.json();
  if(!r.ok) throw new Error(d?.['hydra:description']||d?.detail||'HTTP '+r.status);
  return d;
}

// ── Clipboard ───────────────────────────────────────────
async function copy(text){
  if(navigator.clipboard&&window.isSecureContext){
    try{await navigator.clipboard.writeText(text);return true}catch{}
  }
  const el=document.createElement('textarea');
  el.value=text;el.style.cssText='position:fixed;opacity:0;top:0;left:0;';
  document.body.appendChild(el);el.focus();el.select();
  try{return document.execCommand('copy')}catch{return false}
  finally{document.body.removeChild(el)}
}

function flashBox(id){
  const el=document.getElementById(id);
  el.classList.add('flash');
  setTimeout(()=>el.classList.remove('flash'),900);
}

function flashScreen(){
  const f=document.getElementById('flash');
  f.classList.add('on');
  setTimeout(()=>f.classList.remove('on'),300);
}

function beep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=880;g.gain.value=0.15;
    o.start();setTimeout(()=>{o.stop();ctx.close()},200);
  }catch{}
}

// ── Tap to copy ─────────────────────────────────────────
async function tap(type){
  const text=type==='email'?email:lastCode;
  if(!text) return;
  await copy(text);
  flashBox(type==='email'?'emailBox':'codeBox');
}

// ── Generate email ──────────────────────────────────────
async function genEmail(){
  if(busy) return;
  busy=true; stopAuto();
  seenIds.clear(); lastCode='';
  showCode(null);

  setBtns(true);
  document.getElementById('bEmail').innerHTML='<span class="spin"></span>';
  st('Email yaratilmoqda...','info');

  try{
    const dr=await api('/domains?page=1');
    const dom=dr['hydra:member']?.[0]?.domain;
    if(!dom) throw new Error('Domen topilmadi');

    const u=Math.random().toString(36).slice(2,10);
    const p=Math.random().toString(36).slice(2,18)+'Aa1!';
    const addr=`${u}@${dom}`;

    await api('/accounts',{method:'POST',body:JSON.stringify({address:addr,password:p})});
    const tr=await api('/token',{method:'POST',body:JSON.stringify({address:addr,password:p})});
    token=tr.token; email=addr;

    showEmail(addr);
    await copy(addr);
    flashBox('emailBox');
    st('✓ Email nusxalandi — Telegramga yopish','ok');

    document.getElementById('autoChk').checked=true;
    startAuto();
    document.getElementById('bCode').disabled=false;
    document.getElementById('bNew').disabled=false;
  }catch(e){
    st('✗ '+e.message,'err');
  }finally{
    busy=false;
    document.getElementById('bEmail').innerHTML='<span class="ico">📧</span> EMAIL OL';
    setBtns(false);
  }
}

// ── New email (reset) ───────────────────────────────────
async function newEmail(){
  stopAuto();
  document.getElementById('autoChk').checked=false;
  document.getElementById('bCode').disabled=true;
  document.getElementById('bNew').disabled=true;
  showEmail(null);
  showCode(null);
  await genEmail();
}

// ── Extract code ────────────────────────────────────────
function extract(text){
  if(!text) return null;
  const t=text.replace(/<[^>]+>/g,' ').replace(/&nbsp;/g,' ');
  for(const p of[
    /(?:login|verif|confirm|code|kod)[^\d]*(\d{4,8})/i,
    /(\d{5,6})\s*(?:is your|bu sizning)/i,
    /\b(\d{5,6})\b/,
    /\b(\d{4})\b/,
  ]){const m=t.match(p);if(m)return m[1]}
  return null;
}

// ── Check inbox ─────────────────────────────────────────
async function getCode(isAuto=false){
  if(!token||busy) return;
  busy=true;

  if(!isAuto){
    document.getElementById('bCode').disabled=true;
    document.getElementById('bCode').innerHTML='<span class="spin"></span>';
    st('Inbox tekshirilmoqda...','info');
  }

  try{
    const res=await api('/messages?page=1');
    const msgs=res['hydra:member']||[];

    if(!msgs.length){
      st('📭 Xabar hali kelmadi — kutilmoqda','');
      return;
    }

    const unseen=msgs.filter(m=>!seenIds.has(m.id));
    const target=unseen.length?unseen[0]:msgs[0];
    const full=await api('/messages/'+target.id);
    seenIds.add(target.id);

    const raw=full.text||(full.html?.join(' ')?? '');
    const code=extract(raw);

    if(code){
      lastCode=code;
      showCode(code);
      await copy(code);
      flashBox('codeBox');
      flashScreen();
      beep();
      st('✓ Kod: '+code+' — Telegramga yopish','ok');
      document.getElementById('autoChk').checked=false;
      stopAuto();
    }else{
      st('Xabar keldi — kod topilmadi ('+full.from?.address+')','info');
    }
  }catch(e){
    if(!isAuto) st('✗ '+e.message,'err');
  }finally{
    busy=false;
    if(!isAuto){
      document.getElementById('bCode').disabled=false;
      document.getElementById('bCode').innerHTML='<span class="ico">🔍</span> KOD OL';
    }
  }
}

// ── UI helpers ──────────────────────────────────────────
function showEmail(addr){
  document.getElementById('eEmpty').style.display=addr?'none':'block';
  const v=document.getElementById('eVal');
  v.textContent=addr||''; v.style.display=addr?'block':'none';
  document.getElementById('emailBox').classList.toggle('active',!!addr);
}

function showCode(code){
  document.getElementById('cEmpty').style.display=code?'none':'block';
  const v=document.getElementById('cVal');
  v.textContent=code||''; v.style.display=code?'block':'none';
  document.getElementById('codeBox').classList.toggle('active',!!code);
}

function setBtns(disabled){
  ['bEmail','bCode','bNew'].forEach(id=>{
    if(id!=='bCode'&&id!=='bNew') document.getElementById(id).disabled=disabled;
  });
}

// ── Auto refresh ─────────────────────────────────────────
function toggleAuto(){
  document.getElementById('autoChk').checked?startAuto():stopAuto();
}

function startAuto(){
  stopAuto();
  cdSec=AUTO; updateCd();
  cdTimer=setInterval(async()=>{
    cdSec--;
    if(cdSec<=0){cdSec=AUTO;await getCode(true)}
    updateCd();
  },1000);
}

function stopAuto(){
  if(cdTimer){clearInterval(cdTimer);cdTimer=null}
  cdSec=0; updateCd();
}

function updateCd(){
  document.getElementById('cdTxt').textContent=cdSec>0?cdSec+'s':'';
}

// ── State persistence ───────────────────────────────────
// localStorage'ga saqlash (sahifa yopib qayta ochilganda)
function saveState(){
  if(email) localStorage.setItem('tm_email',email);
  if(token) localStorage.setItem('tm_token',token);
  if(lastCode) localStorage.setItem('tm_code',lastCode);
}

function loadState(){
  const e=localStorage.getItem('tm_email');
  const t=localStorage.getItem('tm_token');
  const c=localStorage.getItem('tm_code');
  if(e&&t){
    email=e; token=t;
    showEmail(e);
    document.getElementById('bCode').disabled=false;
    document.getElementById('bNew').disabled=false;
    st('Avvalgi email yuklandi','info');
  }
  if(c){lastCode=c;showCode(c)}
}

window.addEventListener('beforeunload',saveState);
loadState();
</script>
</body>
</html>
